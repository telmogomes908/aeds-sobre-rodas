
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEDS Sobre Rodas - Check-list Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .loader { border-top-color: #16a34a; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Cabeçalho -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-green-800 mb-2">AEDS Sobre Rodas</h1>
            <p class="text-green-600">Base de Dados Cloud em Tempo Real</p>
            <div id="authStatus" class="text-xs text-gray-500 mt-2">A aguardar autenticação...</div>
        </div>

        <!-- Formulário -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8 border border-green-100">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Novo Registo</h2>
            <form id="registrationForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nome do Participante</label>
                    <input type="text" id="participantName" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2.5 bg-gray-50 border" placeholder="Ex: João Silva">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-green-50 cursor-pointer transition">
                        <input type="checkbox" id="hasBike" class="h-5 w-5 text-green-600 rounded">
                        <span class="text-gray-700 text-sm">Tem Bicicleta?</span>
                    </label>

                    <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-green-50 cursor-pointer transition">
                        <input type="checkbox" id="isFunctional" class="h-5 w-5 text-green-600 rounded">
                        <span class="text-gray-700 text-sm">Bicicleta Funcional?</span>
                    </label>

                    <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-green-50 cursor-pointer transition">
                        <input type="checkbox" id="hasWater" class="h-5 w-5 text-green-600 rounded">
                        <span class="text-gray-700 text-sm">Tem Garrafa de Água?</span>
                    </label>

                    <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-green-50 cursor-pointer transition">
                        <input type="checkbox" id="hasHelmet" class="h-5 w-5 text-green-600 rounded">
                        <span class="text-gray-700 text-sm">Tem Capacete?</span>
                    </label>

                    <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-green-50 cursor-pointer transition">
                        <input type="checkbox" id="hasTools" class="h-5 w-5 text-green-600 rounded">
                        <span class="text-gray-700 text-sm">Tem Ferramentas?</span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" disabled class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    Guardar na Nuvem
                </button>
            </form>
        </div>

        <!-- Lista de Participantes -->
        <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Inscritos</h2>
                <div class="flex items-center gap-2">
                    <button id="exportBtn" class="hidden text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg border border-gray-200 font-semibold transition flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Exportar Excel/Sheets
                    </button>
                    <span id="counter" class="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-1.5 rounded-full">A carregar...</span>
                </div>
            </div>
            
            <div id="participantsList" class="space-y-3">
                <div class="flex justify-center py-8">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuração Global
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registrationForm');
        const list = document.getElementById('participantsList');
        const counter = document.getElementById('counter');
        const authStatus = document.getElementById('authStatus');
        const submitBtn = document.getElementById('submitBtn');
        const exportBtn = document.getElementById('exportBtn');

        let unsubscribeStore = null;
        let currentParticipants = [];

        // 1. Lógica de Autenticação
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Erro na autenticação:", error);
                authStatus.innerText = "Erro de autenticação. Tente recarregar.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authStatus.innerText = `Sessão ativa Cloud`;
                submitBtn.disabled = false;
                setupRealtimeListener();
            } else {
                authStatus.innerText = "Sessão terminada.";
                submitBtn.disabled = true;
                if (unsubscribeStore) unsubscribeStore();
            }
        });

        initAuth();

        // 2. Escuta de dados
        function setupRealtimeListener() {
            if (!auth.currentUser) return;

            const participantsCol = collection(db, 'artifacts', appId, 'public', 'data', 'participants');

            if (unsubscribeStore) unsubscribeStore();

            unsubscribeStore = onSnapshot(participantsCol, (snapshot) => {
                const participants = [];
                snapshot.forEach(doc => {
                    participants.push({ id: doc.id, ...doc.data() });
                });
                
                participants.sort((a, b) => {
                    const dateA = a.createdAt?.seconds || 0;
                    const dateB = b.createdAt?.seconds || 0;
                    return dateB - dateA;
                });
                
                currentParticipants = participants;
                updateUI(participants);
            }, (error) => {
                console.error("Erro Firestore:", error);
                list.innerHTML = `<p class="text-red-500 text-center text-sm p-4">Erro de ligação.</p>`;
            });
        }

        // 3. Função de Exportação para CSV
        exportBtn.addEventListener('click', () => {
            if (currentParticipants.length === 0) return;

            // Cabeçalhos (Headers)
            const headers = ["Nome", "Tem Bicicleta", "Bicicleta Funcional", "Garrafa Água", "Capacete", "Ferramentas"];
            
            // Converter dados para linhas de CSV
            const rows = currentParticipants.map(p => [
                p.name,
                p.hasBike ? "Sim" : "Não",
                p.isFunctional ? "Sim" : "Não",
                p.hasWater ? "Sim" : "Não",
                p.hasHelmet ? "Sim" : "Não",
                p.hasTools ? "Sim" : "Não"
            ]);

            // Unir tudo com ponto e vírgula (formato europeu comum no Excel)
            const csvContent = [
                headers.join(";"),
                ...rows.map(row => row.join(";"))
            ].join("\n");

            // Adicionar BOM para suporte de caracteres latinos (acentos) no Excel
            const blob = new Blob(["\ufeff", csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `AEDS_Participantes_${new Date().toLocaleDateString()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // 4. Submissão
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const participantsCol = collection(db, 'artifacts', appId, 'public', 'data', 'participants');

            const newParticipant = {
                name: document.getElementById('participantName').value,
                hasBike: document.getElementById('hasBike').checked,
                isFunctional: document.getElementById('isFunctional').checked,
                hasWater: document.getElementById('hasWater').checked,
                hasHelmet: document.getElementById('hasHelmet').checked,
                hasTools: document.getElementById('hasTools').checked,
                createdAt: serverTimestamp()
            };

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = "A guardar...";
                await addDoc(participantsCol, newParticipant);
                form.reset();
            } catch (error) {
                console.error("Erro ao adicionar:", error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Guardar na Nuvem";
            }
        });

        // 5. Remover
        window.removeParticipant = async (id) => {
            if (!auth.currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'participants', id));
            } catch (error) {
                console.error("Erro ao remover:", error);
            }
        };

        function updateUI(participants) {
            counter.innerText = `${participants.length} pessoa(s)`;
            
            if (participants.length > 0) {
                exportBtn.classList.remove('hidden');
            } else {
                exportBtn.classList.add('hidden');
            }

            if (participants.length === 0) {
                list.innerHTML = `<p class="text-gray-400 text-center py-4 italic">Nenhum participante registado ainda.</p>`;
                return;
            }

            list.innerHTML = '';
            participants.forEach(p => {
                const div = document.createElement('div');
                div.className = 'p-4 border rounded-xl bg-gray-50 flex flex-col md:flex-row md:items-center justify-between gap-2 card';
                
                div.innerHTML = `
                    <div>
                        <h3 class="font-bold text-gray-800">${p.name}</h3>
                        <div class="flex flex-wrap gap-2 mt-1">
                            ${badge('Bike', p.hasBike)}
                            ${badge('Funcional', p.isFunctional)}
                            ${badge('Água', p.hasWater)}
                            ${badge('Capacete', p.hasHelmet)}
                            ${badge('Ferramentas', p.hasTools)}
                        </div>
                    </div>
                    <button onclick="removeParticipant('${p.id}')" class="text-red-400 hover:text-red-600 text-xs font-medium uppercase">Eliminar</button>
                `;
                list.appendChild(div);
            });
        }

        function badge(text, active) {
            const color = active ? 'bg-green-100 text-green-700 border-green-200' : 'bg-gray-200 text-gray-400 border-gray-300';
            const icon = active ? '✓' : '✗';
            return `<span class="text-[10px] px-2 py-0.5 rounded border ${color} font-medium">${icon} ${text}</span>`;
        }
    </script>
</body>
</html>
